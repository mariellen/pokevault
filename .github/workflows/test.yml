name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pokevault-refactor/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: pokevault-refactor
      - name: Run Jest tests
        run: npx jest --ci --coverage
        working-directory: pokevault-refactor
        env:
          NODE_ENV: test
